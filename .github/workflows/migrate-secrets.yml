name: Vault to GCP Secret Migration

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment (prod or non-prod)'
        required: true
        default: 'non-prod'
        type: choice
        options:
          - non-prod
          - prod
      vault_path:
        description: 'Vault KV Path (e.g., apps/app-a/db-password)'
        required: true
        type: string
      gcp_secret_id:
        description: 'GCP Secret ID (e.g., app-db-password)'
        required: true
        type: string

jobs:
  migrate-secrets:
    name: Run Python Migration Script
    runs-on: ubuntu-latest
    
    # Do not leak secrets in the logs. We are explicitly using secure env vars.
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # cache pip dependencies to speed up pipeline

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hvac google-cloud-secret-manager

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          # This securely loads the JSON key without printing it to the console
          credentials_json: '${{ secrets.GCP_SA_KEY_JSON }}'
          
      - name: Execute Migration Script
        id: run-migration
        env:
          # Injecting secrets securely as environment variables ONLY for this step
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          VAULT_ADDR: 'https://vault.internal:8200'
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          VAULT_PATH: ${{ github.event.inputs.vault_path }}
          GCP_SECRET_ID: ${{ github.event.inputs.gcp_secret_id }}
        run: |
          echo "Starting Migration for ${{ github.event.inputs.environment }}..."
          cd scripts
          python main.py
          
      - name: Cleanup & Status Check
        if: always()
        run: |
          echo "Migration pipeline finished. Final Status: ${{ job.status }}"
          if [ "${{ job.status }}" != "success" ]; then
            echo "Pipeline failed! Please check the Python logs above for error details."
            exit 1
          else
            echo "Pipeline succeeded! The static secret has been securely migrated."
          fi
