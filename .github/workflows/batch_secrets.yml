name: "Secret Manager: Create/Update/Delete Secrets (Batch)"

on:
  workflow_dispatch:
    inputs:
      projectName:
        description: "GCP Project ID"
        required: true
        type: string

      region:
        description: "Region for the secrets"
        required: true
        type: choice
        options:
          - us-west3

      action:
        description: "Action to perform on all secrets in the batch"
        required: true
        type: choice
        options:
          - create
          - update
          - delete

      secrets_json:
        description: |
          JSON array of secrets.

          create/update:
          [
            {"name":"MY_SECRET_1","value":"v1"},
            {"name":"MY_SECRET_2","value":"v2"}
          ]

          delete:
          [
            {"name":"MY_SECRET_1"},
            {"name":"MY_SECRET_2"}
          ]
        required: true
        type: string

      serviceAccountName:
        description: "SA / group email(s) to grant access"
        required: false
        type: string

      kmsKeyName:
        description: "Full KMS key resource path for CMEK encryption"
        required: false
        type: string

      environment:
        description: "Environment of project"
        required: true
        type: choice
        options:
          - non-prod
          - prod

      app:
        description: "Application name"
        required: false
        type: string

      env:
        description: "Environment label (prod/staging/dev)"
        required: false
        type: string

      project:
        description: "Project label"
        required: false
        type: string

      cost-center:
        description: "Cost center label"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

jobs:
  review-user-input:
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Mask secret values
        run: |
          SECRETS_JSON=$(jq -r '.inputs.secrets_json // "[]"' "$GITHUB_EVENT_PATH")

          while IFS= read -r val; do
            echo "::add-mask::$val"
          done < <(
            echo "$SECRETS_JSON" | jq -r '.[].value | select(. != null and . != "")'
          )

      - name: Review Inputs
        run: |
          SECRETS_JSON=$(jq -r '.inputs.secrets_json // "[]"' "$GITHUB_EVENT_PATH")
          SECRET_NAMES=$(echo "$SECRETS_JSON" | jq -r '[.[].name] | join(", ")')

          echo "action: ${{ inputs.action }}"
          echo "projectName: ${{ inputs.projectName }}"
          echo "region: ${{ inputs.region }}"
          echo "secret_names: $SECRET_NAMES"
          echo "serviceAccountName: ${{ inputs.serviceAccountName }}"
          echo "app: ${{ inputs.app }}"
          echo "env: ${{ inputs.env }}"
          echo "project: ${{ inputs.project }}"
          echo "cost-center: ${{ inputs.cost-center }}"

  approve:
    needs: [review-user-input]
    runs-on: ubuntu-latest
    name: "approve apply ${{ inputs.projectName }}"

    steps:
      - name: Apply approved
        run: |
          echo "======================"
          echo "APPLY APPROVED"
          echo "======================"
          echo "project id: ${{ inputs.projectName }}"
          echo "action: ${{ inputs.action }}"
          echo "approved by: ${{ github.actor }}"
          echo "run id: ${{ github.run_id }}"

  execute:
    needs: [approve]
    runs-on: ubuntu-latest
    name: "${{ inputs.action }}-secrets"
    environment: ${{ inputs.environment }}
    continue-on-error: false

    steps:
      - name: Mask secret values
        run: |
          SECRETS_JSON=$(jq -r '.inputs.secrets_json // "[]"' "$GITHUB_EVENT_PATH")

          while IFS= read -r val; do
            echo "::add-mask::$val"
          done < <(
            echo "$SECRETS_JSON" | jq -r '.[].value | select(. != null and . != "")'
          )

      - name: Validate inputs
        run: |
          SECRETS_JSON=$(jq -r '.inputs.secrets_json // "[]"' "$GITHUB_EVENT_PATH")

          if ! echo "$SECRETS_JSON" | jq -e 'type == "array" and length > 0' > /dev/null; then
            echo "Error: secrets_json must be a non-empty JSON array."
            exit 1
          fi

          dupes=$(echo "$SECRETS_JSON" | jq -r '
            map(.name)
            | group_by(.)
            | map(select(length > 1) | .[0])
            | join(",")
          ')

          if [ -n "$dupes" ]; then
            echo "Error: duplicate secret names in batch: $dupes"
            exit 1
          fi

          secret_pattern='^[a-zA-Z0-9]([a-zA-Z0-9_-]{0,253}[a-zA-Z0-9])?$'

          count=$(echo "$SECRETS_JSON" | jq 'length')

          for i in $(seq 0 $((count - 1))); do
            name=$(echo "$SECRETS_JSON" | jq -r ".[$i].name")
            value=$(echo "$SECRETS_JSON" | jq -r ".[$i].value // empty")

            if ! [[ "$name" =~ $secret_pattern ]]; then
              echo "Invalid secret name: $name"
              exit 1
            fi

            if [[ "${{ inputs.action }}" != "delete" && -z "$value" ]]; then
              echo "Missing value for $name"
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.projectName }}

      - name: Configure KMS key
        run: |
          gcloud config set project "${{ inputs.projectName }}" --verbosity=error
          echo "kmskey=${{ inputs.kmsKeyName }}" >> "$GITHUB_ENV"

      - name: Create secrets
        if: ${{ inputs.action == 'create' }}
        env:
          PROJECT: ${{ inputs.projectName }}
        run: |
          LABELS="managed-by=github"

          [[ -n "${{ inputs.env }}" ]] && LABELS="${LABELS},env=${{ inputs.env }}"
          [[ -n "${{ inputs.app }}" ]] && LABELS="${LABELS},app=${{ inputs.app }}"
          [[ -n "${{ inputs.project }}" ]] && LABELS="${LABELS},project=${{ inputs.project }}"
          [[ -n "${{ inputs.cost-center }}" ]] && LABELS="${LABELS},cost-center=${{ inputs.cost-center }}"

          SECRETS_JSON=$(jq -r '.inputs.secrets_json // "[]"' "$GITHUB_EVENT_PATH")
          count=$(echo "$SECRETS_JSON" | jq 'length')

          existing=$(gcloud secrets list \
            --project="$PROJECT" \
            --format="value(name)")

          for i in $(seq 0 $((count - 1))); do
            name=$(echo "$SECRETS_JSON" | jq -r ".[$i].name")
            value=$(echo "$SECRETS_JSON" | jq -r ".[$i].value")

            if echo "$existing" | grep -qx "$name"; then
              echo "[$name] already exists — skipping."
              continue
            fi

            cat > replication_policy.yaml <<EOF
          userManaged:
            replicas:
              - location: ${{ inputs.region }}
          EOF

            if [[ -n "${{ env.kmskey }}" ]]; then
               echo "                customerManagedEncryption:" >> replication_policy.yaml
               echo "                  kmsKeyName: ${{ env.kmskey }}" >> replication_policy.yaml
            fi

            printf '%s' "$value" | gcloud secrets create "$name" \
              --data-file=- \
              --replication-policy-file=replication_policy.yaml \
              --labels="$LABELS"

            echo "Created secret: $name"
          done

      - name: Update secrets
        if: ${{ inputs.action == 'update' }}
        run: |
          SECRETS_JSON=$(jq -r '.inputs.secrets_json // "[]"' "$GITHUB_EVENT_PATH")
          count=$(echo "$SECRETS_JSON" | jq 'length')

          for i in $(seq 0 $((count - 1))); do
            name=$(echo "$SECRETS_JSON" | jq -r ".[$i].name")
            value=$(echo "$SECRETS_JSON" | jq -r ".[$i].value")

            printf '%s' "$value" | gcloud secrets versions add "$name" \
              --data-file=-

            echo "Updated secret: $name"
          done

      - name: Delete secrets
        if: ${{ inputs.action == 'delete' }}
        run: |
          SECRETS_JSON=$(jq -r '.inputs.secrets_json // "[]"' "$GITHUB_EVENT_PATH")
          count=$(echo "$SECRETS_JSON" | jq 'length')

          for i in $(seq 0 $((count - 1))); do
            name=$(echo "$SECRETS_JSON" | jq -r ".[$i].name")

            gcloud secrets delete "$name" --quiet

            echo "Deleted secret: $name"
          done
